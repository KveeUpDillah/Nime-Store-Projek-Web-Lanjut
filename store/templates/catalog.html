{% extends 'index.html' %}
{% load static %}
{% block content %}
<style>
  .catalog-section {
    padding: 3rem 0;
  }

  .plan-card {
    border: 1px solid #e5e5e5;
    border-radius: 10px;
    overflow: hidden;
    height: 100%;
    background: #fff;
  }

  .plan-card-body {
    padding: 1.25rem 1.25rem 1rem;
  }

  .plan-card-body h5 {
    font-weight: 700;
    margin-bottom: 0.15rem;
  }

  .plan-card-body p {
    color: var(--brand-gray);
    font-size: 0.9rem;
    margin: 0;
  }

  .plan-card-image {
    background: #e9e9e9;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .plan-card-image img {
    height: 100%;
    width: 100%;
    object-fit: cover;
  }

  .plan-card-footer {
    padding: 1.25rem;
  }

  .btn-buy {
    width: 100%;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    background: #fff;
    padding: 0.55rem 0;
    font-weight: 600;
    color: var(--brand-dark);
    transition: background 0.2s;
  }

  .btn-buy:hover {
    background: #f5f5f5;
  }
</style>

<div class="container catalog-section">
  <div class="row g-4">
    <div class="col-md-4">
      <div class="plan-card">
        <div class="plan-card-body">
          <h5>Plan 1</h5>
          <p>For individuals</p>
        </div>
        <div class="plan-card-image">
          <img src="{% static 'images/download.jpg' %}" alt="Plan 1">
        </div>
        <div class="plan-card-footer">
          <button class="btn-buy">Buy</button>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="plan-card">
        <div class="plan-card-body">
          <h5>Plan 1</h5>
          <p>For individuals</p>
        </div>
        <div class="plan-card-image">
          <img src="{% static 'images/download.jpg' %}" alt="Plan 1">
        </div>
        <div class="plan-card-footer">
          <button class="btn-buy">Buy</button>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="plan-card">
        <div class="plan-card-body">
          <h5>Plan 1</h5>
          <p>For individuals</p>
        </div>
        <div class="plan-card-image">
          <img src="{% static 'images/download.jpg' %}" alt="Plan 1">
        </div>
        <div class="plan-card-footer">
          <button class="btn-buy">Buy</button>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
