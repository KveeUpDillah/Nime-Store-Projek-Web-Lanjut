{% extends "admin_panel/base.html" %}
{% block title %}{% if category %}Edit{% else %}Tambah{% endif %} Kategori{% endblock %}
{% block page_title %}{% if category %}Edit{% else %}Tambah{% endif %} Kategori{% endblock %}
{% block content %}
<div class="panel-card" style="max-width:400px">
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label" style="font-size:13px">Nama kategori</label>
      <input type="text" name="name" class="form-control form-control-sm"
             value="{{ category.name|default:'' }}" required autofocus>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-sm btn-primary">Simpan</button>
      <a href="{% url 'admin_categories' %}" class="btn btn-sm btn-light">Batal</a>
    </div>
  </form>
</div>
{% endblock %}
