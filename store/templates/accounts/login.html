{% extends 'layouts/index.html' %}
{% load static %}


{% block content %}
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:70px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:50px;
}

.left{
    width:40%;
}

.left h1{
    font-size:70px;
    margin-bottom:40px;
}

.input-group{
    margin-bottom:25px;
}

.input-group input{
    width:100%;
    height:65px;
    border:none;
    background:#d9d9d9;
    padding:15px;
    font-size:18px;
}

.buttons{
    margin-top:20px;
    display:flex;
    gap:25px;
}

.btn-login{
    background:black;
    color:white;
    border:none;
    padding:14px 40px;
    border-radius:10px;
    cursor:pointer;
}

.btn-register{
    text-decoration:none;
    color:black;
    border:1px solid #555;
    padding:13px 35px;
    border-radius:10px;
}

.error-message{
    color:red;
    margin-bottom:15px;
}

.btn-google{
    margin-top:20px;
    width:100%;
    height:55px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;

    text-decoration:none;
    color:#444;
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;

    font-size:16px;
    font-weight:bold;

    transition:.3s;
}

.btn-google:hover{
    background:#f5f5f5;
    border-color:#bbb;
}

.btn-google img{
    width:22px;
    height:22px;
}

/* Right image */
.right{
    width:55%;
}

.right img{
    width:100%;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.bottom-line{
    border-bottom:3px solid #1e90ff;
    margin-top:50px;
}

@media(max-width:900px){
    .container{
        flex-direction:column;
    }

    .left,
    .right{
        width:100%;
    }

    .left h1{
        font-size:50px;
    }
}
</style>

<div class="container">

    <div class="left">
        <h1>Login</h1>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="input-group">
                <input type="text"
                       name="username"
                       placeholder="Username"
                       required>
            </div>

            <div class="input-group">
                <input type="password"
                       name="password"
                       placeholder="Password"
                       required>
            </div>

            {% if pesan %}
                <p class="error-message">{{ pesan }}</p>
            {% endif %}

            <div class="buttons">
                <button type="submit" class="btn-login">
                    Login
                </button>

                <a href="{% url 'register' %}" class="btn-register">
                    Register
                </a>
            </div>
        </form>
        <a href="{% url 'google_login' %}" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                alt="Google Logo">
            <span>Login dengan Google</span>
        </a>
    </div>

    <div class="right">
        <img src="{% static 'images/white2.jpg' %}"
             alt="Login Image">
    </div>

</div>
{% endblock %}
