{% extends 'layouts/index.html' %}

{% block content %}
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:70px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:50px;
}

.left{
    width:40%;
}

.left h1{
    font-size:70px;
    margin-bottom:40px;
}

.input-group{
    margin-bottom:25px;
}

.input-group input{
    width:100%;
    height:65px;
    border:none;
    background:#d9d9d9;
    padding:15px;
    font-size:18px;
}

.buttons{
    margin-top:20px;
    display:flex;
    gap:25px;
}

.btn-register{
    background:black;
    color:white;
    border:none;
    padding:14px 40px;
    border-radius:10px;
    cursor:pointer;
}

.btn-login{
    text-decoration:none;
    color:black;
    border:1px solid #555;
    padding:13px 35px;
    border-radius:10px;
}

.error-message{
    color:red;
    margin-bottom:15px;
}

.success-message{
    color:green;
    margin-bottom:15px;
}

.right{
    width:55%;
}

.right img{
    width:100%;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

@media(max-width:900px){
    .container{
        flex-direction:column;
    }

    .left,
    .right{
        width:100%;
    }

    .left h1{
        font-size:50px;
    }
}
</style>

<div class="container">

    <div class="left">
        <h1>Register</h1>

        <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}

            <div class="input-group">
                <input type="text"
                       name="username"
                       placeholder="Username"
                       required>
            </div>

            <div class="input-group">
                <input type="email"
                       name="email"
                       placeholder="Email"
                       required>
            </div>

            <div class="input-group">
                <input type="password"
                       name="password1"
                       placeholder="Password"
                       required>
            </div>

            <div class="input-group">
                <input type="password"
                       name="password2"
                       placeholder="Konfirmasi Password"
                       required>
            </div>

            {% if pesan %}
                <p class="error-message">{{ pesan }}</p>
            {% endif %}

            <div class="buttons">
                <button type="submit" class="btn-register">
                    Register
                </button>

                <a href="{% url 'login' %}" class="btn-login">
                    Login
                </a>
            </div>
        </form>
    </div>

    <div class="right">
        <img src="https://images.unsplash.com/photo-1515003197210-e0cd71810b5f?w=1200"
             alt="Register Image">
    </div>

</div>
{% endblock %}
